services:
  - type: web
    name: tecmart-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false # Set this in the Render dashboard: https://your-app.vercel.app
      - key: MONGO_URI
        sync: false # Set your MongoDB Atlas URI in the Render dashboard
      - key: JWT_SECRET
        sync: false # Generate: node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      - key: ADMIN_EMAIL
        sync: false # Your admin email address
      - key: ADMIN_PASSWORD_HASH
        sync: false # Run: node -e "require('bcryptjs').hash('YourPassword',12).then(h=>console.log(h))"
